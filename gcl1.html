<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Dashboard | Mobile-Optimized</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f8fafc; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .card { 
            background: white; 
            border-radius: 16px; 
            padding: 1.5rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease;
        }
        canvas {
            max-height: 250px !important; /* Prevents charts from becoming too tall on mobile */
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div class="px-4 py-8 max-w-6xl mx-auto lg:py-12">
        
        <header class="mb-10 text-center lg:text-left">
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">Noa Protein Analysis</h1>
            <p class="text-slate-500 mt-2 font-medium">Testing Data Insights & Performance</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="card border-l-4 border-blue-500 flex flex-col justify-center">
                <span class="text-[10px] md:text-xs uppercase font-bold text-slate-400 tracking-widest">Responses</span>
                <span class="text-2xl md:text-3xl font-black text-slate-800 mt-1">37</span>
            </div>
            <div class="card border-l-4 border-emerald-500 flex flex-col justify-center">
                <span class="text-[10px] md:text-xs uppercase font-bold text-slate-400 tracking-widest">Taste Score</span>
                <span class="text-2xl md:text-3xl font-black text-slate-800 mt-1">2.84<span class="text-sm font-normal text-slate-400 ml-1">/5</span></span>
            </div>
            <div class="card border-l-4 border-violet-500 flex flex-col justify-center">
                <span class="text-[10px] md:text-xs uppercase font-bold text-slate-400 tracking-widest">Texture</span>
                <span class="text-2xl md:text-3xl font-black text-slate-800 mt-1">3.27<span class="text-sm font-normal text-slate-400 ml-1">/5</span></span>
            </div>
            <div class="card border-l-4 border-amber-500 flex flex-col justify-center">
                <span class="text-[10px] md:text-xs uppercase font-bold text-slate-400 tracking-widest">Purchase</span>
                <span class="text-2xl md:text-3xl font-black text-slate-800 mt-1">2.68<span class="text-sm font-normal text-slate-400 ml-1">/5</span></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Noa vs Other brand</h3>
                <canvas id="compChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Consumption Frequency</h3>
                <canvas id="freqChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Protein Preferences</h3>
                <canvas id="proteinChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Overall Taste Rating</h3>
                <canvas id="tasteChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Texture Rating</h3>
                <canvas id="textureChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-slate-700 mb-6 text-sm md:text-base border-b border-slate-100 pb-3">Reasonable Price (1kg)</h3>
                <canvas id="priceChart"></canvas>
            </div>

        </div>

        <footer class="mt-12 text-center text-slate-400 text-xs">
            &copy; 2024 Noa Protein Powder Survey Data
        </footer>
    </div>

    <script>
        // Global defaults for mobile responsiveness
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.font.size = 11;
        Chart.defaults.responsive = true;
        Chart.defaults.maintainAspectRatio = false;

        const setupChart = (id, type, labels, data, colors, isHorizontal = false) => {
            new Chart(document.getElementById(id), {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderRadius: 6,
                        borderWidth: 0
                    }]
                },
                options: {
                    indexAxis: isHorizontal ? 'y' : 'x',
                    plugins: { 
                        legend: { display: type === 'pie' || type === 'doughnut', position: 'bottom' } 
                    },
                    scales: (type === 'bar') ? {
                        y: { grid: { display: false } },
                        x: { grid: { display: false } }
                    } : {}
                }
            });
        };

        // Initialize Charts
        setupChart('compChart', 'doughnut', ['Worse', 'Same', 'Better'], [19, 10, 8], ['#f43f5e', '#94a3b8', '#10b981']);
        setupChart('freqChart', 'pie', ['Daily', 'Occasional', '3-5d', '1-2d', 'Never'], [14, 13, 4, 3, 3], ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444']);
        setupChart('proteinChart', 'bar', ['Isolate', 'Conc.', 'Plant', 'Egg', 'Soy'], [14, 8, 6, 4, 3], '#6366f1', true);
        setupChart('tasteChart', 'bar', ['1 (Poor)', '2', '3', '4 (Good)'], [5, 7, 14, 11], '#10b981');
        setupChart('textureChart', 'bar', ['1', '2', '3', '4', '5'], [3, 6, 13, 8, 7], '#8b5cf6');
        setupChart('priceChart', 'bar', ['<1.5k', '1.5-2k', '2-2.5k', '2.5-3k', '>3k'], [12, 20, 2, 2, 1], '#f59e0b');
    </script>
</body>
</html>
