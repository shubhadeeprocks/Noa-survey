<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Protein Powder Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f4f8; } /* Mild bluish-grey background */
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-extrabold text-gray-800 mb-10 text-center text-indigo-900">Noa Protein Powder Analysis</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10 text-center">
            <div class="card border-b-4 border-blue-500">
                <p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Total Responses</p>
                <p class="text-4xl font-black text-blue-600 mt-2">37</p>
            </div>
            <div class="card border-b-4 border-emerald-500">
                <p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Avg Taste Score</p>
                <p class="text-4xl font-black text-emerald-600 mt-2">2.84<span class="text-lg text-gray-400">/5</span></p>
            </div>
            <div class="card border-b-4 border-purple-500">
                <p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Avg Texture Score</p>
                <p class="text-4xl font-black text-purple-600 mt-2">3.27<span class="text-lg text-gray-400">/5</span></p>
            </div>
            <div class="card border-b-4 border-amber-500">
                <p class="text-gray-500 text-xs uppercase tracking-wider font-bold">Purchase Intent</p>
                <p class="text-4xl font-black text-amber-600 mt-2">2.68<span class="text-lg text-gray-400">/5</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Consumption Frequency</h3>
                <canvas id="freqChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Current Protein Preferences</h3>
                <canvas id="proteinChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Overall Taste Rating (1-5)</h3>
                <canvas id="tasteChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Texture Smoothness Rating (1-5)</h3>
                <canvas id="textureChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Noa vs Other brand</h3>
                <canvas id="compChart"></canvas>
            </div>

            <div class="card">
                <h3 class="font-bold text-gray-700 mb-6 text-lg border-b pb-2">Reasonable Price (for 1kg)</h3>
                <canvas id="priceChart"></canvas>
            </div>

        </div>
    </div>

    <script>
        // Set default font for all charts
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = "#4b5563";

        // 1. Frequency
        new Chart(document.getElementById('freqChart'), {
            type: 'pie',
            data: {
                labels: ['Daily', 'Occasionally', '3-5 days/wk', '1-2 days/wk', 'Never'],
                datasets: [{
                    data: [14, 13, 4, 3, 3],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } } }
        });

        // 2. Protein Types
        new Chart(document.getElementById('proteinChart'), {
            type: 'bar',
            data: {
                labels: ['Whey Isolate', 'Whey Conc.', 'Plant-Based', 'Egg White', 'Soy'],
                datasets: [{
                    label: 'Users',
                    data: [14, 8, 6, 4, 3],
                    backgroundColor: '#6366f1',
                    borderRadius: 4
                }]
            },
            options: { indexAxis: 'y', plugins: { legend: { display: false } } }
        });

        // 3. Taste Distribution
        new Chart(document.getElementById('tasteChart'), {
            type: 'bar',
            data: {
                labels: ['1 (Poor)', '2', '3', '4 (Good)'],
                datasets: [{
                    label: 'Count',
                    data: [5, 7, 14, 11],
                    backgroundColor: '#10b981',
                    borderRadius: 4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 4. Texture Distribution
        new Chart(document.getElementById('textureChart'), {
            type: 'bar',
            data: {
                labels: ['1', '2', '3', '4', '5'],
                datasets: [{
                    label: 'Count',
                    data: [3, 6, 13, 8, 7],
                    backgroundColor: '#8b5cf6',
                    borderRadius: 4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // 5. Noa vs Other brand
        new Chart(document.getElementById('compChart'), {
            type: 'doughnut',
            data: {
                labels: ['Worse than current', 'About the Same', 'Better than current'],
                datasets: [{
                    data: [19, 10, 8],
                    backgroundColor: ['#f43f5e', '#94a3b8', '#22c55e'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '65%', plugins: { legend: { position: 'bottom' } } }
        });

        // 6. Price Distribution
        new Chart(document.getElementById('priceChart'), {
            type: 'bar',
            data: {
                labels: ['< 1500', '1.5k-2k', '2k-2.5k', '2.5k-3k', '> 3000'],
                datasets: [{
                    label: 'Responses',
                    data: [12, 20, 2, 2, 1],
                    backgroundColor: '#f59e0b',
                    borderRadius: 4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
