<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noa Protein | Professional Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="transition-colors duration-300">

    <div class="max-w-6xl mx-auto p-4 md:p-10">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black tracking-tight header-gradient">Noa Analysis</h1>
                <p class="text-slate-500 font-medium">Consumer Testing Insights</p>
            </div>
            
            <div class="flex items-center gap-3 bg-white dark:bg-slate-800 p-2 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
                <span class="text-xs font-bold text-slate-400 ml-2">LIGHT</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="themeToggle" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                </label>
                <span class="text-xs font-bold text-slate-400 mr-2">DARK</span>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="card border-t-4 border-blue-500">
                <span class="kpi-label">Responses</span>
                <div class="kpi-value" id="kpi-total">0</div>
            </div>
            <div class="card border-t-4 border-emerald-500">
                <span class="kpi-label">Avg Taste</span>
                <div class="kpi-value" id="kpi-taste">0.00</div>
            </div>
            <div class="card border-t-4 border-violet-500">
                <span class="kpi-label">Avg Texture</span>
                <div class="kpi-value" id="kpi-texture">0.00</div>
            </div>
            <div class="card border-t-4 border-amber-500">
                <span class="kpi-label">Purchase %</span>
                <div class="kpi-value" id="kpi-purchase">0.00</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="card"><h3 class="chart-title">Noa vs Other brand</h3><div class="chart-container"><canvas id="compChart"></canvas></div></div>
            <div class="card"><h3 class="chart-title">Frequency</h3><div class="chart-container"><canvas id="freqChart"></canvas></div></div>
            <div class="card"><h3 class="chart-title">Protein Types</h3><div class="chart-container"><canvas id="proteinChart"></canvas></div></div>
            <div class="card"><h3 class="chart-title">Taste Dist.</h3><div class="chart-container"><canvas id="tasteChart"></canvas></div></div>
            <div class="card"><h3 class="chart-title">Texture Dist.</h3><div class="chart-container"><canvas id="textureChart"></canvas></div></div>
            <div class="card"><h3 class="chart-title">Price Range</h3><div class="chart-container"><canvas id="priceChart"></canvas></div></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
